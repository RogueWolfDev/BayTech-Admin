name: iOS Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Show Project Files
        run: |
          pwd
          ls
          find . -name "*.xcodeproj"

      - name: Build App
        run: |
          xcodebuild \
            -project "BayTech Admin.xcodeproj" \
            -scheme "BayTech Admin" \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            build