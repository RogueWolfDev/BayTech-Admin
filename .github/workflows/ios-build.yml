name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Project Files
        run: |
          echo "PWD:"
          pwd
          echo "ROOT:"
          ls -la
          echo "XCODEPROJ:"
          find . -name "*.xcodeproj"
          echo "XCWORKSPACE:"
          find . -name "*.xcworkspace"

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Build App
        run: |
          xcodebuild \
            -project "./BayTech Admin.xcodeproj" \
            -scheme "BayTech Admin" \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            build
