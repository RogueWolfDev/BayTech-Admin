name: iOS Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Check files
        run: |
          echo "PWD:"
          pwd
          echo "ROOT:"
          ls -la
          echo "LEVEL 2:"
          find . -maxdepth 2 -print
          echo "XCODE FILES:"
          find . -maxdepth 6 \( -name "*.xcodeproj" -o -name "*.xcworkspace" \)

      - name: Build App
        run: |
          xcodebuild \
            -project "BayTech Admin.xcodeproj" \
            -scheme "BayTech Admin" \
            -destination 'generic/platform=iOS Simulator' \
            build
